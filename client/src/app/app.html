<main>
  <h1>Weather Forecast</h1>

  @if (loading()) {
    <p>Loading...</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
  } @else {
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Summary</th>
          <th>°C</th>
          <th>°F</th>
        </tr>
      </thead>
      <tbody>
        @for (forecast of forecasts(); track forecast.date) {
          <tr>
            <td>{{ forecast.date }}</td>
            <td>{{ forecast.summary }}</td>
            <td>{{ forecast.temperatureC }}</td>
            <td>{{ forecast.temperatureF }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</main>
